<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fusion — Scanner de Produção</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060d1a;
      --surface: #0f1d30;
      --surface2: #162438;
      --border: #1e3550;
      --text: #e8f1ff;
      --muted: #5a7a9e;
      --accent: #3b82f6;
      --accent-glow: rgba(59,130,246,0.3);
      --green: #22c55e;
      --green-glow: rgba(34,197,94,0.25);
      --red: #ef4444;
      --yellow: #f59e0b;
      --setor-color: #3b82f6;
      --setor-glow: rgba(59,130,246,0.25);
      --radius: 16px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 50% at 50% -10%, var(--setor-glow) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      transition: background 0.5s;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ───────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,29,48,0.85);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--setor-color), #6366f1);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.5s;
      box-shadow: 0 0 16px var(--setor-glow);
    }

    .header-info h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1;
    }

    .header-info p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .ws-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .ws-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .ws-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* ── Main ─────────────────────────────────────── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      overflow-y: auto;
      gap: 20px;
    }

    /* ── Setor badge grande ────────────────────────── */
    .setor-badge {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--setor-color);
      border-radius: var(--radius);
      width: 100%;
      max-width: 520px;
      box-shadow: -4px 0 20px var(--setor-glow);
      transition: border-color 0.4s, box-shadow 0.4s;
    }

    .setor-color-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--setor-color);
      flex-shrink: 0;
      box-shadow: 0 0 10px var(--setor-glow);
      transition: background 0.4s;
    }

    .setor-info { flex: 1; }

    .setor-info .label {
      font-size: 10px;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .setor-info .nome {
      font-size: 18px;
      font-weight: 700;
      margin-top: 2px;
      color: var(--setor-color);
      transition: color 0.4s;
    }

    .setor-info .desc {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Loading state ─────────────────────────────── */
    #loading-state {
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Scanner card ─────────────────────────────── */
    .scanner-card {
      width: 100%;
      max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
    }

    .scan-icon-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .scan-icon-wrap svg {
      width: 48px;
      height: 48px;
      color: var(--setor-color);
      transition: color 0.4s;
    }

    .scan-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--setor-color);
      animation: spin 1.5s linear infinite;
      transition: border-color 0.4s;
    }

    .scan-ring.ready {
      animation: none;
      border: 2px solid var(--green);
      box-shadow: 0 0 14px var(--green-glow);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .scan-label { text-align: center; }
    .scan-label h2 { font-size: 18px; font-weight: 700; }
    .scan-label p  { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .barcode-wrap { position: relative; width: 100%; }

    #barcode-input {
      width: 100%;
      background: var(--surface2);
      border: 2px solid var(--border);
      color: var(--text);
      border-radius: 12px;
      padding: 16px 44px 16px 20px;
      font-size: 24px;
      font-family: 'Courier New', monospace;
      font-weight: 700;
      letter-spacing: 3px;
      text-align: center;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #barcode-input:focus {
      border-color: var(--setor-color);
      box-shadow: 0 0 0 4px var(--setor-glow);
    }

    #barcode-input::placeholder {
      font-size: 13px;
      letter-spacing: 0;
      font-weight: 400;
      color: var(--muted);
    }

    .clear-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: none;
    }

    .clear-btn:hover { color: var(--text); }

    .hint {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    kbd {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 11px;
    }

    /* ── Feedback card ─────────────────────────────── */
    .feedback-card {
      width: 100%;
      max-width: 520px;
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp 0.2s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .feedback-success {
      background: rgba(34,197,94,0.06);
      border: 1px solid rgba(34,197,94,0.3);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .feedback-success .check {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(34,197,94,0.15);
      border: 2px solid var(--green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .feedback-success .info h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
    }

    .feedback-success .info p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .feedback-error {
      background: rgba(239,68,68,0.06);
      border: 1px solid rgba(239,68,68,0.3);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .feedback-error .x-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(239,68,68,0.1);
      border: 2px solid var(--red);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .feedback-error .info h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--red);
    }

    .feedback-error .info p {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Contador de bips ──────────────────────────── */
    .counter-strip {
      width: 100%;
      max-width: 520px;
      display: flex;
      gap: 10px;
    }

    .counter-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      text-align: center;
    }

    .counter-card .c-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
    }

    .counter-card .c-value {
      font-size: 28px;
      font-weight: 900;
      margin-top: 2px;
      line-height: 1;
    }

    /* ── Toast ─────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      z-index: 999;
      pointer-events: none;
    }

    .toast {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 32px #0004;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: toastIn 0.2s ease;
      white-space: nowrap;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .toast.success { border-left: 4px solid var(--green); }
    .toast.error   { border-left: 4px solid var(--red); }

    /* ── Sem setor — fallback ──────────────────────── */
    #no-setor-msg {
      display: none;
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
    }

    #no-setor-msg h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
    #no-setor-msg p  { font-size: 14px; line-height: 1.7; }
    #no-setor-msg code {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon" id="logo-icon">📡</div>
      <div class="header-info">
        <h1 id="header-title">Scanner FUSION</h1>
        <p id="header-sub">Carregando setor...</p>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="font-size:12px;color:var(--muted);padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface)" id="user-badge"></div>
      <button onclick="doLogout()" style="font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-family:inherit" title="Sair">&#8594; Sair</button>
      <div class="ws-badge">
        <div class="ws-dot" id="ws-dot"></div>
        <span id="ws-label">Conectando...</span>
      </div>
    </div>
  </header>

  <main id="main-content">
    <div id="loading-state">Carregando configuração do setor...</div>
  </main>
</div>

<div id="toast-container"></div>

<script>
  /* ── State ─────────────────────────────────────── */
  let SETOR = null;
  let ALL_SUBSTATUSES = [];
  let CURRENT_USER = null;
  let scanDebounce = null;
  let counts = { ok: 0, erro: 0 };
  let lastResult = null;

  /* ── Auth helpers ───────────────────────────────── */
  function getToken() { return localStorage.getItem('maxi_token'); }

  async function api(path, opts = {}) {
    const token = getToken();
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    const r = await fetch(path, { ...opts, headers });
    if (r.status === 401) {
      localStorage.removeItem('maxi_token');
      location.replace('/login');
      throw new Error('Sessão expirada');
    }
    if (!r.ok) throw new Error((await r.json().catch(() => ({}))).detail || r.statusText);
    return r.json();
  }

  async function doLogout() {
    try { await api('/api/logout', { method: 'POST' }); } catch (_) {}
    localStorage.removeItem('maxi_token');
    localStorage.removeItem('maxi_username');
    localStorage.removeItem('maxi_role');
    location.replace('/login');
  }

  /* ── Boot ──────────────────────────────────────── */
  async function boot() {
    // Bloqueia acesso sem token antes de qualquer renderização
    if (!getToken()) { location.replace('/login'); return; }

    connectWS();

    try {
      [CURRENT_USER, ALL_SUBSTATUSES] = await Promise.all([
        api('/api/me'),
        api('/api/substatuses'),
      ]);
    } catch (_) { return; }

    // Exibe nome do usuário no header
    const badge = document.getElementById('user-badge');
    if (badge) badge.textContent = CURRENT_USER.username;

    const params = new URLSearchParams(location.search);
    const setorId = params.get('setor');

    // Substatuses disponíveis para este usuário
    const allowedIds = CURRENT_USER.allowed_substatus_ids; // null = admin (todos)
    const allowedSubs = allowedIds === null
      ? ALL_SUBSTATUSES
      : ALL_SUBSTATUSES.filter(s => allowedIds.includes(s.id));

    if (!setorId) {
      showSetorPicker(allowedSubs);
      return;
    }

    const found = ALL_SUBSTATUSES.find(s => String(s.id) === String(setorId));

    if (!found) {
      showNoSetorMsg(setorId);
      return;
    }

    // Valida permissão: USER só pode usar substatuses autorizados
    if (allowedIds !== null && !allowedIds.includes(found.id)) {
      showDeniedMsg(found);
      return;
    }

    SETOR = found;
    applySetorTheme(SETOR.cor);
    renderUI();
  }

  /* ── Theme dinâmico pela cor do setor ─────────── */
  function applySetorTheme(cor) {
    const glow = hexToRgba(cor, 0.25);
    document.documentElement.style.setProperty('--setor-color', cor);
    document.documentElement.style.setProperty('--setor-glow', glow);
    document.documentElement.style.setProperty('--accent', cor);
    document.documentElement.style.setProperty('--accent-glow', hexToRgba(cor, 0.3));
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  /* ── Render ────────────────────────────────────── */
  function renderUI() {
    // Atualiza header
    document.getElementById('header-title').textContent = SETOR.nome;
    document.getElementById('header-sub').textContent = (SETOR.fluxo ? SETOR.fluxo + ' • ' : '') + 'Scanner de Produção';

    document.getElementById('main-content').innerHTML = `
      <!-- Setor badge -->
      <div class="setor-badge">
        <div class="setor-color-dot" id="setor-dot" style="background:${SETOR.cor}"></div>
        <div class="setor-info">
          <div class="label">Setor Ativo</div>
          <div class="nome">${escHtml(SETOR.nome)}</div>
          <div class="desc">Todos os bips serão registrados com este sub-status</div>
        </div>
      </div>

      <!-- Scanner card -->
      <div class="scanner-card">
        <div class="scan-icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M3.75 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 013.75 9.375v-4.5zM3.75 14.625c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5a1.125 1.125 0 01-1.125-1.125v-4.5zM13.5 4.875c0-.621.504-1.125 1.125-1.125h4.5c.621 0 1.125.504 1.125 1.125v4.5c0 .621-.504 1.125-1.125 1.125h-4.5A1.125 1.125 0 0113.5 9.375v-4.5zM6.75 6.75h.75v.75h-.75v-.75zM6.75 16.5h.75v.75h-.75v-.75zM16.5 6.75h.75v.75h-.75v-.75zM13.5 13.5h.75v.75h-.75v-.75zM13.5 19.5h.75v.75h-.75v-.75zM19.5 13.5h.75v.75h-.75v-.75zM19.5 19.5h.75v.75h-.75v-.75zM16.5 16.5h.75v.75h-.75v-.75z" />
          </svg>
          <div class="scan-ring" id="scan-ring"></div>
        </div>

        <div class="scan-label">
          <h2>Aguardando Bip</h2>
          <p>Aponte o leitor na OP e o sub-status será aplicado automaticamente</p>
        </div>

        <div class="barcode-wrap">
          <input id="barcode-input" type="text" placeholder="Aguardando leitura..."
                 autocomplete="off" autofocus inputmode="numeric" />
          <button class="clear-btn" id="clear-btn" onclick="clearInput()">✕</button>
        </div>

        <p class="hint">Campo sempre pronto para o scanner. Pressione <kbd>Enter</kbd> para confirmar.</p>
      </div>

      <!-- Feedback -->
      <div id="feedback-area"></div>

      <!-- Contadores da sessão -->
      <div class="counter-strip">
        <div class="counter-card">
          <div class="c-label">✓ Bipados OK</div>
          <div class="c-value" id="cnt-ok" style="color:var(--green)">0</div>
        </div>
        <div class="counter-card">
          <div class="c-label">✗ Não encontrados</div>
          <div class="c-value" id="cnt-err" style="color:var(--red)">0</div>
        </div>
      </div>`;

    setupInput();
  }

  /* ── Input ─────────────────────────────────────── */
  function setupInput() {
    const input = document.getElementById('barcode-input');
    const clearBtn = document.getElementById('clear-btn');

    input.addEventListener('input', () => {
      clearBtn.style.display = input.value ? 'block' : 'none';
      clearTimeout(scanDebounce);
      scanDebounce = setTimeout(processBarcode, 600);
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { clearTimeout(scanDebounce); processBarcode(); }
      if (e.key === 'Escape') clearInput();
    });

    // Foco sempre no campo
    document.addEventListener('click', () => setTimeout(() => input?.focus(), 50));
    input.focus();
  }

  function clearInput() {
    const input = document.getElementById('barcode-input');
    if (!input) return;
    input.value = '';
    document.getElementById('clear-btn').style.display = 'none';
    clearTimeout(scanDebounce);
    input.focus();
  }

  /* ── Processar bip e auto-aplicar substatus ────── */
  async function processBarcode() {
    const input = document.getElementById('barcode-input');
    if (!input) return;
    const code = input.value.trim();
    if (!code || code.length < 2) return;

    const ring = document.getElementById('scan-ring');
    if (ring) ring.classList.remove('ready');

    try {
      // 1. Busca o pedido pelo código bipado
      const scan = await api(`/api/scan/${encodeURIComponent(code)}`);

      if (!scan.found) {
        counts.erro++;
        updateCounters();
        showFeedback('error', code, null);
        clearInput();
        return;
      }

      const order = scan.order;

      // 2. Aplica imediatamente o substatus do setor, sem interação do usuário
      await api(`/api/orders/${encodeURIComponent(order.op)}/substatus`, {
        method: 'PUT',
        body: JSON.stringify({
          substatus_id: SETOR.id,
          scanner_input: code,
        }),
      });

      counts.ok++;
      updateCounters();
      if (ring) ring.classList.add('ready');
      showFeedback('success', code, order);

    } catch (err) {
      counts.erro++;
      updateCounters();
      showFeedback('error', code, null, err.message);
    }

    clearInput();
  }

  /* ── Feedback visual ───────────────────────────── */
  function showFeedback(type, code, order, errMsg) {
    clearTimeout(lastResult);
    const area = document.getElementById('feedback-area');
    if (!area) return;

    if (type === 'success') {
      const nome = order.fantasia || order.razao_social || '—';
      area.innerHTML = `
        <div class="feedback-card">
          <div class="feedback-success">
            <div class="check">✓</div>
            <div class="info">
              <h3>OP ${escHtml(order.op)} — ${escHtml(SETOR.nome)}</h3>
              <p>${escHtml(nome)} &nbsp;·&nbsp; <span style="color:var(--setor-color)">${escHtml(SETOR.nome)}</span> aplicado</p>
            </div>
          </div>
        </div>`;
    } else {
      area.innerHTML = `
        <div class="feedback-card">
          <div class="feedback-error">
            <div class="x-icon">✕</div>
            <div class="info">
              <h3>OP não encontrada</h3>
              <p>Código: <b>${escHtml(code)}</b>${errMsg ? ' — ' + escHtml(errMsg) : ''}</p>
            </div>
          </div>
        </div>`;
    }

    // Fade out após 3s
    lastResult = setTimeout(() => {
      if (area) area.innerHTML = '';
      const ring = document.getElementById('scan-ring');
      if (ring) ring.classList.remove('ready');
    }, 3000);
  }

  function updateCounters() {
    const ok  = document.getElementById('cnt-ok');
    const err = document.getElementById('cnt-err');
    if (ok)  ok.textContent  = counts.ok;
    if (err) err.textContent = counts.erro;
  }

  /* ── Seletor de setor (quando não há ?setor=) ────── */
  function showSetorPicker(allowedSubs) {
    const main = document.getElementById('main-content');
    document.getElementById('header-title').textContent = 'Escolha o Setor';
    document.getElementById('header-sub').textContent = 'Toque no setor em que você está trabalhando';

    if (!allowedSubs.length) {
      main.innerHTML = `
        <div style="text-align:center;max-width:480px;padding:20px">
          <div style="font-size:48px;margin-bottom:16px">🔒</div>
          <h2 style="font-size:20px;font-weight:700;margin-bottom:10px">Sem setores autorizados</h2>
          <p style="color:var(--muted);font-size:14px;line-height:1.7">
            Sua conta não possui nenhum sub-status autorizado.<br>
            Solicite ao administrador que configure suas permissões.
          </p>
        </div>`;
      return;
    }

    const fluxos = {};
    allowedSubs.forEach(s => {
      const f = s.fluxo || 'Geral';
      if (!fluxos[f]) fluxos[f] = [];
      fluxos[f].push(s);
    });

    let cards = '';
    for (const [f, list] of Object.entries(fluxos)) {
      cards += `<div style="font-size:10px;text-transform:uppercase;color:var(--muted);font-weight:700;letter-spacing:0.08em;margin:16px 0 8px;text-align:left;width:100%;max-width:520px">${f}</div>`;
      cards += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:520px">`;
      cards += list.map(s => `
        <button onclick="selectSetor(${s.id})" style="
          background:rgba(${hexToRgbParts(s.cor)},0.08);
          border:2px solid ${s.cor}44;
          border-radius:12px;padding:16px;cursor:pointer;
          display:flex;flex-direction:column;align-items:center;gap:8px;
          transition:border-color 0.2s,background 0.2s;font-family:inherit">
          <div style="width:20px;height:20px;border-radius:50%;background:${s.cor};box-shadow:0 0 10px ${s.cor}66"></div>
          <span style="font-size:13px;font-weight:600;color:${s.cor};text-align:center">${escHtml(s.nome)}</span>
        </button>`).join('');
      cards += `</div>`;
    }

    main.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;width:100%;padding:10px 16px">${cards}</div>`;
  }

  function selectSetor(id) {
    const found = ALL_SUBSTATUSES.find(s => s.id === id);
    if (!found) return;
    SETOR = found;
    applySetorTheme(SETOR.cor);
    document.getElementById('header-title').textContent = SETOR.nome;
    document.getElementById('header-sub').textContent = (SETOR.fluxo || '') + ' • Scanner de Produção';
    renderUI();
    // Atualiza URL silenciosamente sem reload
    history.replaceState(null, '', `?setor=${id}`);
  }

  function hexToRgbParts(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `${r},${g},${b}`;
  }

  /* ── Acesso negado ao setor ──────────────────────── */
  function showDeniedMsg(setor) {
    const main = document.getElementById('main-content');
    main.innerHTML = `
      <div style="text-align:center;max-width:480px;padding:20px">
        <div style="font-size:48px;margin-bottom:16px">⛔</div>
        <h2 style="font-size:20px;font-weight:700;margin-bottom:10px;color:var(--red)">Acesso Negado</h2>
        <p style="color:var(--muted);font-size:14px;line-height:1.7">
          Você não tem permissão para operar o setor<br>
          <b style="color:var(--text)">${escHtml(setor.nome)}</b>.<br><br>
          Solicite ao administrador que adicione este setor às suas permissões,
          ou acesse a URL sem o parâmetro <code>?setor</code> para ver seus setores autorizados.
        </p>
        <button onclick="history.replaceState(null,'','/scanner');boot()"
          style="margin-top:20px;padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">
          Ver Meus Setores
        </button>
      </div>`;
  }

  /* ── Sem setor configurado ─────────────────────── */
  function showNoSetorMsg(id) {
    const main = document.getElementById('main-content');
    let lista = '';
    if (ALL_SUBSTATUSES.length) {
      const fluxos = {};
      ALL_SUBSTATUSES.forEach(s => {
        const f = s.fluxo || 'Geral';
        if (!fluxos[f]) fluxos[f] = [];
        fluxos[f].push(s);
      });
      for (const [f, sublist] of Object.entries(fluxos)) {
        lista += `<div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;margin:10px 0 4px">${f}</div>`;
        lista += sublist.map(s => `<code style="border-left:3px solid ${s.cor};margin:3px 0;display:block">?setor=${s.id} — ${s.nome}</code>`).join('');
      }
    }

    main.innerHTML = `
      <div style="text-align:center;max-width:480px;padding:20px">
        <div style="font-size:48px;margin-bottom:16px">⚙️</div>
        <h2 style="font-size:20px;font-weight:700;margin-bottom:10px">Setor não configurado</h2>
        <p style="color:var(--muted);font-size:14px;line-height:1.7;margin-bottom:20px">
          ${id ? `O setor <b>${escHtml(id)}</b> não foi encontrado.<br>` : ''}
          Abra esta página com o parâmetro <code>?setor=ID</code> correspondente ao sub-status do setor.
        </p>
        ${lista ? `<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:left">
          <div style="font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;margin-bottom:10px">Setores Disponíveis</div>
          ${lista}
        </div>` : ''}
      </div>`;
  }

  /* ── WebSocket ─────────────────────────────────── */
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen = () => {
      document.getElementById('ws-dot').classList.add('on');
      document.getElementById('ws-label').textContent = 'Online';
    };
    ws.onclose = () => {
      document.getElementById('ws-dot').classList.remove('on');
      document.getElementById('ws-label').textContent = 'Reconectando...';
      setTimeout(connectWS, 3000);
    };
    setInterval(() => { if (ws?.readyState === 1) ws.send('ping'); }, 25000);
  }

  /* ── Helpers ───────────────────────────────────── */
  function escHtml(s = '') {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3000);
  }

  boot();
</script>
</body>
</html>
