name: Deploy MAXI to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Copy repository contents via scp
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "."
          target: "/root/projetos/MAXI"
          rm: true

      - name: Install dependencies and Restart PM2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd /root/projetos/MAXI
            
            # Garante que as pastas de banco de dados e arquivos existam
            mkdir -p dashboard/data
            touch output.html pedidos.json
            
            # Recria a imagem com novos logs e sobe a aplicação linkada ao Traefik
            docker-compose up -d --build
